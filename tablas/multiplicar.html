<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tablas de Multiplicar</title>
  <link rel="stylesheet" href="multiplicar.css">
  <script src="multiplicar.js" defer></script>
</head>
<body>

  <header class="header">
    <button class="btn-probar" onclick="generarTablas()">PROBAR</button>
  </header>

  <main class="contenedor-principal" id="divTabla">
    <!-- Este es el contenedor que agrupa las filas -->
    <div class="tabla-contenedor">
      <div class="fila-multiplicar">3 x 1 = 3</div>
      <div class="fila-multiplicar">3 x 2 = 6</div>
      <div class="fila-multiplicar">3 x 3 = 9</div>
      <div class="fila-multiplicar">3 x 4 = 12</div>
      <div class="fila-multiplicar">3 x 5 = 15</div>
      <div class="fila-multiplicar">3 x 6 = 18</div>
      <div class="fila-multiplicar">3 x 7 = 21</div>
      <div class="fila-multiplicar">3 x 8 = 24</div>
      <div class="fila-multiplicar">3 x 9 = 27</div>
      <div class="fila-multiplicar">3 x 10 = 30</div>
    </div>
  </main>

  <footer class="footer">
    <p>Creado por: Kevin Quishpe 🚀</p>
  </footer>

</body>
</html>
