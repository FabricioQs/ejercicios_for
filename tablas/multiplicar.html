<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FABRITEKHX | Tablas Interactivas</title>
  <link rel="icon" type="image/png" href="img/LOGO.png">
  <link rel="stylesheet" href="multiplicar.css">
  <script src="multiplicar.js" defer></script>
</head>
<body>

  <div class="background-glow"></div>

  <header class="header">
    <div class="inputs-contenedor">
      
      <!-- Logo y Branding Limpio -->
      <div class="brand-container">
        <img src="img/LOGO.png" alt="FABRITEKHX Logo" class="app-logo">
        <h1 class="brand-name">FABRITEKHX</h1>
      </div>
      
      <!-- Paso 19: Instrucciones Claras y Directas -->
      <p class="instruccion">Escribe un número y descubre su tabla de multiplicar.</p>
      
      <div class="input-grupo">
        <input type="number" id="txtTabla" placeholder="Ej: 7">
        <button class="btn-probar" onclick="generarTablas()">GENERAR</button>
      </div>
      
      <!-- Paso 19: Mensaje de ayuda sutil -->
      <small class="mensaje-ayuda">💡 Puedes probar con cualquier número entero.</small>
      
    </div>
  </header>

  <main class="contenedor-principal">
    <div class="tabla-contenedor" id="divTabla">
      <!-- Mensaje de inicio intuitivo -->
      <div class="estado-vacio">
        <span class="icono-vacio">🔢</span>
        <p>Aún no has generado ninguna tabla.</p>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>© 2026 <strong>FABRITEKHX</strong>. Todos los derechos reservados.</p>
  </footer>

</body>
</html>
